version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: movie-booking-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: movie_booking
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d movie_booking"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: movie-booking-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: movie-booking-backend
    restart: always
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/movie_booking?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=your_super_secret_access_token_key
      - JWT_REFRESH_SECRET=your_super_secret_refresh_token_key
      - FRONTEND_URL=http://localhost:5173
      - TMDB_API_KEY=1b7ad81bb8326f76b13009d5be880174
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "npx prisma migrate deploy && npm run dev"

  frontend:
    build: ./frontend
    container_name: movie-booking-frontend
    restart: always
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - BACKEND_URL=http://backend:5000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
