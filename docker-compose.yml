version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cinemaa-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: movie_booking
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d movie_booking"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cinemaa-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: cinemaa-backend
    restart: always
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/movie_booking?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=change_this_to_a_long_random_string
      - JWT_REFRESH_SECRET=change_this_to_another_long_random_string
      - FRONTEND_URL=http://localhost:5173
      - TMDB_API_KEY=your_tmdb_api_key_here
      # Gmail SMTP
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_SECURE=false
      - SMTP_USER=your_gmail@gmail.com
      - SMTP_PASS=your_gmail_app_password
      - EMAIL_FROM=CineMaa <your_gmail@gmail.com>
      - BCRYPT_SALT_ROUNDS=12
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "npx prisma migrate deploy && npm run dev"

  frontend:
    build: ./frontend
    container_name: cinemaa-frontend
    restart: always
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - BACKEND_URL=http://backend:5000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
